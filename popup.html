<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" type="text/css" href="style.css" />
    </head>
    <body>
        <header class="header-container">
            <a 
                href="https://github.com/naufalhanif25/simkuliah-login-bot-chrome-ext.git"
                target="_blank"
            >
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width="18" 
                    height="18" 
                    fill="currentColor" 
                    class="bi bi-github" 
                    viewBox="0 0 16 16"
                >
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"/>
                </svg>
            </a>
        </header>
        <div class="main-container">
            <div class="head-container">
                <img class="popup-logo" src="public/usk.svg" alt="USK Logo" />
                <h1 class="popup-title">SIMKULIAH Login Bot</h1>
            </div>
            <div class="all-container">
                <div class="form-container">
                    <span class="npm-container">
                        <h2>NPM</h2>
                        <input
                            id="npm-input"
                            type="text"
                            placeholder="Enter NPM"
                        />
                    </span>
                    <span class="password-container">
                        <h2>Password</h2>
                        <span class="password-entry">
                            <input
                                id="password-input"
                                type="password"
                                placeholder="Enter password"
                            />
                            <button id="password-button"></button>
                        </span>
                    </span>
                    <span id="log-container"></span>
                    <span id="autoclose-checkbox">
                        <label class="checkbox">
                            <input
                                id="checkbox" 
                                type="checkbox"
                            >
                            <span class="checkmark">
                                <span></span>
                            </span>
                        </label>
                        <p>
                            Auto close window after login
                        </p>
                    </span>
                </div>
                <button id="login-button">Login ➡️</button>
                <a 
                    class="report-hyperlink"
                    href="mailto:falhnf25@gmail.com?subject=SIMKULIAH%20Login%20Bot%20Extension%20Issue&body=%3Cyour_issues%3E"
                    target="_blank"
                >
                    Report a problem
                </a>
            </div>
        </div>
        <script src="popup.js"></script>
    </body>
</html>
